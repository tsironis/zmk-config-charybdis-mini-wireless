CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_EXT_POWER=y

# PMW3610 Driver (tsironis fork of efogdev)
CONFIG_PMW3610=y
CONFIG_PMW3610_SMART_ALGORITHM=y

# Report interval for responsive tracking (12ms = ~83Hz)
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12

# Anti-warp: discard large deltas after inactivity (enabled by default in fork)
CONFIG_PMW3610_ANTI_WARP=y
CONFIG_PMW3610_IGNORE_AFTER_REST=y

# REST Downshift Configuration
# Run → REST1 downshift after 5 seconds of inactivity
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=5000

# REST1: Check for movement every 100ms, downshift after 10s
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=100
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=10000

# REST2: Check for movement every 200ms, downshift after 60s
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=200
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=60000

# REST3: Deepest sleep state - maximize interval (driver max: 2550ms)
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=2550

# Extra delay for sensor power-up stabilization
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=1000

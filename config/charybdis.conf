CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Fix: ACL TX buffer exhaustion deadlock (Zephyr #53455, #78761)
# macOS Sequoia negotiates latency=0, driving burst HID notifications that exhaust
# the nRF52840 ACL TX pool. BLE host blocks on bt_l2cap_create_pdu_timeout(K_FOREVER).
# Invariant: BT_L2CAP_TX_BUF_COUNT >= BT_ATT_TX_COUNT + 2
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_ATT_TX_COUNT=6

# Raise minimum connection interval to reduce macOS Sequoia burst TX pressure
# (ZMK #2661: Sequoia ignores latency hints and negotiates latency=0 with min interval)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# BLE notify thread stack — increased for combined keyboard + trackball HID load
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=2048
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Power Management
# Idle mode after 30s of inactivity (lighter power saving before deep sleep)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable deep sleep support to reduce power consumption when idle
CONFIG_ZMK_SLEEP=y

# Enter deep sleep after 15 minutes of inactivity.
# On deep sleep wake, full driver re-init clears sensor registers.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

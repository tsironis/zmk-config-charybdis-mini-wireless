CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9

CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Power Management
# Idle mode after 30s of inactivity (lighter power saving before deep sleep)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable deep sleep support to reduce power consumption when idle
CONFIG_ZMK_SLEEP=y

# Enter deep sleep after 15 minutes of inactivity.
# On deep sleep wake, full driver re-init clears sensor registers.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

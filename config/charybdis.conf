CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Fix: system workqueue starvation deadlock (Zephyr #53455, #78761, #16803)
# Root cause: tx_complete_work (BLE TX buffer recycling) competes on the system
# workqueue with PMW3610 sensor events and split BLE relay. Under macOS Sequoia
# burst mode (latency=0), the system WQ saturates, tx_complete_work starves,
# buffers never recycle, bt_l2cap_create_pdu_timeout(K_FOREVER) deadlocks.

# Give BLE RX its own workqueue — removes contention with sensor/split work items
CONFIG_BT_RECV_WORKQ_BT=y

# Route ZMK non-critical work (input, split) off the system workqueue
CONFIG_ZMK_LOW_PRIORITY_WORK_QUEUE=y

# Increase system workqueue stack for concurrent PMW3610 + split BLE + BLE TX work
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ACL/L2CAP/ATT TX buffer pool — expanded to reduce exhaustion risk
# Invariant: BT_L2CAP_TX_BUF_COUNT >= BT_ATT_TX_COUNT + 2
# Invariant: BT_BUF_EVT_RX_COUNT > BT_BUF_ACL_TX_COUNT
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=11
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_ATT_TX_COUNT=4
CONFIG_BT_CONN_TX_MAX=10

# Raise minimum connection interval to reduce macOS Sequoia burst TX pressure
# (ZMK #2661: Sequoia ignores latency hints and negotiates latency=0 with min interval)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# BLE notify thread stack — increased for combined keyboard + trackball HID load
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=2048
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Power Management
# Idle mode after 30s of inactivity (lighter power saving before deep sleep)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable deep sleep support to reduce power consumption when idle
CONFIG_ZMK_SLEEP=y

# Enter deep sleep after 15 minutes of inactivity.
# On deep sleep wake, full driver re-init clears sensor registers.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
